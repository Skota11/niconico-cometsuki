<div id="vcm-recording-root">
    <style>
        #vcm-recording-root {
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .vcm-border-indicator {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: 6px solid #ff0055;
            pointer-events: none;
            z-index: 999998;
        }

        .vcm-ui-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 999999;
            background-color: rgba(20, 20, 20, 0.95);
            color: #ffffff;
            padding: 18px 24px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid #333;
            min-width: 240px;
        }

        .vcm-info-div {
            font-size: 13px;
            color: #cccccc;
            line-height: 1.5;
        }

        .vcm-timer {
            margin-top: 4px;
            font-weight: bold;
            color: #00ffcc;
        }

        .vcm-stop-btn {
            width: 100%;
            padding: 12px 18px;
            background: linear-gradient(135deg, #ff0055, #cc0044);
            color: #ffffff;
            font-weight: bold;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .vcm-stop-btn:hover {
            background: linear-gradient(135deg, #ff3377, #ff0055);
            transform: translateY(-1px);
        }

        #vcm-warning {
            background-color: #fff;
            color: #5a0000;
            border: 1px solid #ff657a;
            padding: 10px 12px;
            border-radius: 6px;
            font-weight: 700;
            align-items: center;
        }

        #vcm-warning .vcm-warning-text {
            font-size: 13px;
        }
    </style>

    <div class="vcm-border-indicator"></div>

    <div class="vcm-ui-container">
        <div id="vcm-warning" role="alert" aria-live="assertive">
            <div class="vcm-warning-text">録画中はシークバーを動かさないでください。<br />音ズレの原因になります。</div>
        </div>
        <div class="vcm-info-div">
            <div>品質 <b id="vcm-quality-text" style="color:#fff;">-</b></div>
            <div>フォーマット <b id="vcm-status-text" style="color:#fff;">-</b></div>
            <div class="vcm-timer" id="vcm-timer">経過時間: 0秒</div>
        </div>
        <button class="vcm-stop-btn" id="vcm-stop-btn">■ 録画を停止して保存</button>
    </div>
</div>
